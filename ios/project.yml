# XcodeGen spec — generate the Xcode project with:  xcodegen generate
# (install via `brew install xcodegen`). The .xcodeproj is NOT committed; this
# file is the source of truth for the project structure.
name: Verdancy
options:
  bundleIdPrefix: com.verdancy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "" # set your Apple Developer Team ID
    TARGETED_DEVICE_FAMILY: "1" # iPhone
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Amplify:
    url: https://github.com/aws-amplify/amplify-swift
    from: "2.30.0"

targets:
  Verdancy:
    type: application
    platform: iOS
    sources:
      - path: Verdancy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.verdancy.app
        PRODUCT_NAME: Verdancy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Verdancy/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Verdancy/Resources/Verdancy.entitlements
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: Amplify
        product: Amplify
      - package: Amplify
        product: AWSCognitoAuthPlugin
      - package: Amplify
        product: AWSPluginsCore
      - target: VerdancyWidget

  # "Due today" home-screen widget. Reads the App Group summary the app writes;
  # shares WidgetShared + Theme sources with the app target.
  # NOTE: the App Group (group.com.verdancy.app) must be registered on the Apple
  # Developer portal and enabled for both bundle ids — manual, account-side setup.
  VerdancyWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: VerdancyWidget
      - path: Verdancy/Shared
      - path: Verdancy/DesignSystem/Theme.swift
    info:
      path: VerdancyWidget/Info.plist
      properties:
        CFBundleDisplayName: Verdancy
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: VerdancyWidget/VerdancyWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.verdancy.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.verdancy.app.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
